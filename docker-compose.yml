services:
  orbit-api:
    build: ./backend
    ports:
      - "8090:8090"
    environment:
      PORT: 8090
      JWT_SECRET: orbit-career-secret
  orbit-web:
    build: ./web
    ports:
      - "5174:5174"
    environment:
      VITE_API_BASE_URL: http://localhost:8090/api
    depends_on:
      - orbit-api
