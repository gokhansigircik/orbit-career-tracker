xt><text x="940" y="706" fill="#B3C3DE" font-size="22" font-family="Inter, Arial, sans-serif">Zero-infra local demo setup</text><text x="940" y="738" fill="#B3C3DE" font-size="22" font-family="Inter, Arial, sans-serif">with portable contributor flows.</text></g><g><rect x="1280" y="420" width="250" height="220" rx="28" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)"/><text x="1310" y="462" fill="#67E8F9" font-size="14" font-family="Inter, Arial, sans-serif" letter-spacing="4">OUTCOME</text><text x="1310" y="516" fill="white" font-size="34" font-family="Inter, Arial, sans-serif" font-weight="700">Focused Search</text><text x="1310" y="562" fill="#B3C3DE" font-size="22" font-family="Inter, Arial, sans-serif">A better operating system</text><text x="1310" y="594" fill="#B3C3DE" font-size="22" font-family="Inter, Arial, sans-serif">for software-engineering roles.</text></g></svg>
